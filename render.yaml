services:
  - type: web
    name: optimal-body-os-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: optimal_body_os
      - key: APP_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mohamed-fadel-wd.github.io
      - key: APP_URL
        value: https://mohamed-fadel-wd.github.io/optimal-body-os/
